<div class="quantum-canvas" id="quantumCanvas">
    
    <button class="quantum-btn btn-start" id="btnStart">Click aqui</button>

    <svg class="flux-overlay" viewBox="0 0 600 400">
        <path class="flux-line line-top" d="M 150,110 C 300,110 250,200 300,200" />
        <path class="flux-line line-bottom" d="M 450,110 C 300,110 350,200 300,200" />
    </svg>

    <div class="tech-module mod-gold" id="modGold">
        <div class="module-tag">CONEXIÓN</div>
        <p>Configura conexiones de red</p>
    </div>

    <div class="tech-glow-core" id="glowCore"></div>

    <div class="tech-module mod-green" id="modGreen">
        <div class="module-tag">COMPARTICIÓN</div>
        <p>Configura y comparte recursos de red</p>
    </div>

    <div class="master-panel" id="masterPanel">
        <div class="matrix-bg"></div>
        <div class="panel-header">
            <span class="status-dot"></span>
            CORE SYSTEM ACTIVATED
        </div>
        <p class="panel-text">Gestiona recursos mediante el uso de redes de computadoras</p>
    </div>

    <button class="quantum-btn btn-rewind" id="btnRewind">Rebobinar ↺</button>

</div>

<style>
    /* Lienzo principal */
    .quantum-canvas {
        position: relative;
        width: 100%;
        max-width: 700px;
        height: 450px;
        margin: 0 auto;
        background: transparent;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
    }

    /* Botones de Control */
    .quantum-btn {
        position: absolute;
        padding: 12px 26px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-start {
        top: 20px;
        left: 20px;
        background: #0f172a;
        color: #38bdf8;
        box-shadow: 0 4px 20px rgba(56, 189, 248, 0.15), inset 0 1px 1px rgba(255,255,255,0.1);
    }
    .btn-start:hover {
        background: #38bdf8;
        color: #0f172a;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(56, 189, 248, 0.3);
    }

    .btn-rewind {
        bottom: 25px;
        background: rgba(15, 23, 42, 0.8);
        color: #94a3b8;
        opacity: 0;
        transform: translateY(15px) scale(0.9);
        pointer-events: none;
        backdrop-filter: blur(8px);
    }
    .btn-rewind.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
    }
    .btn-rewind:hover {
        color: #fff;
        background: #1e293b;
        border-color: rgba(255,255,255,0.2);
    }

    .quantum-btn.hidden {
        opacity: 0 !important;
        pointer-events: none !important;
        transform: scale(0.8) translateY(-10px);
    }

    /* Módulos Tecnológicos Iniciales (Sleek Glassmorphism) */
    .tech-module {
        position: absolute;
        width: 220px;
        padding: 20px;
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 14px;
        color: #f1f5f9;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        opacity: 0;
        transform: scale(0.8) translateY(30px);
        transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-sizing: border-box;
    }
    .tech-module p {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1.4;
        font-weight: 500;
    }
    .module-tag {
        font-size: 0.6rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
        text-transform: uppercase;
    }

    /* Posicionamiento y colores personalizados de los módulos */
    .mod-gold {
        left: 80px;
        top: 140px;
        border-left: 4px solid #f59e0b;
    }
    .mod-gold .module-tag { color: #f59e0b; }

    .mod-green {
        right: 80px;
        top: 140px;
        border-left: 4px solid #10b981;
    }
    .mod-green .module-tag { color: #10b981; }

    /* Núcleo de energía oculto */
    .tech-glow-core {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #34d399;
        border-radius: 50%;
        filter: blur(20px);
        opacity: 0;
        transition: all 1s ease;
    }

    /* Capa de vectores/líneas de flujo fluido */
    .flux-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 1;
    }
    .flux-line {
        fill: none;
        stroke-width: 2px;
        stroke-dasharray: 150;
        stroke-dashoffset: 150;
        opacity: 0;
    }
    .line-top { stroke: url(#gradientGold); }
    .line-bottom { stroke: url(#gradientGreen); }

    /* Panel Maestro Final (Efecto Cyber-Dashboard) */
    .master-panel {
        position: relative;
        width: 380px;
        padding: 30px;
        background: linear-gradient(135deg, #064e3b, #022c22);
        border: 1px solid rgba(52, 211, 153, 0.3);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(2, 44, 34, 0.4), 0 0 40px rgba(52, 211, 153, 0.1);
        opacity: 0;
        transform: scale(0.6);
        transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 5;
        overflow: hidden;
        text-align: center;
        box-sizing: border-box;
    }
    .panel-header {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 2px;
        color: #34d399;
        margin-bottom: 15px;
    }
    .status-dot {
        width: 6px;
        height: 6px;
        background: #34d399;
        border-radius: 50%;
        box-shadow: 0 0 8px #34d399;
        animation: pulseDot 1s infinite alternate;
    }
    .panel-text {
        margin: 0;
        color: #e6f4ea;
        font-size: 1.1rem;
        line-height: 1.4;
        font-weight: 600;
    }

    /* --- DISPARADORES DE ANIMACIÓN POR CLASES DE JS --- */
    
    /* Fase Inicial: Aparecen los paneles limpios flotando */
    .run-pop .tech-module {
        opacity: 1;
        transform: scale(1) translateY(0);
        animation: floatA 5s infinite ease-in-out alternate;
    }
    .run-pop .mod-green {
        animation-name: floatB;
    }

    /* Fase de Disolución y Flujo Fluido (A los 9 segundos) */
    .run-flow .tech-module {
        opacity: 0;
        transform: scale(0.5) filter(blur(10px));
        pointer-events: none;
    }
    .run-flow .flux-line {
        opacity: 1;
        animation: drawFlux 1.8s forwards ease-in-out;
    }
    .run-flow .tech-glow-core {
        opacity: 1;
        transform: scale(8);
    }

    /* Fase de Fusión Exitosa */
    .run-fusion .flux-line {
        opacity: 0;
        transition: opacity 0.3s;
    }
    .run-fusion .tech-glow-core {
        opacity: 0;
        transform: scale(0);
    }
    .run-fusion .master-panel {
        opacity: 1;
        transform: scale(1);
    }

    /* Keyframes */
    @keyframes floatA {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(-10px) rotate(1deg); }
    }
    @keyframes floatB {
        0% { transform: translateY(0) rotate(0deg); }
        100% { transform: translateY(-10px) rotate(-1deg); }
    }
    @keyframes drawFlux {
        0% { stroke-dashoffset: 150; }
        100% { stroke-dashoffset: 0; }
    }
    @keyframes pulseDot {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
    }
</style>

<svg width="0" height="0">
    <defs>
        <linearGradient id="gradientGold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#34d399" />
        </linearGradient>
        <linearGradient id="gradientGreen" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#34d399" />
        </linearGradient>
    </defs>
</svg>

<script>
    (function() {
        const canvas = document.getElementById('quantumCanvas');
        const btnStart = document.getElementById('btnStart');
        const btnRewind = document.getElementById('btnRewind');

        let sequenceTimers = [];

        // Función para limpiar hilos de tiempo activos
        function clearAllTimers() {
            sequenceTimers.forEach(timer => clearTimeout(timer));
            sequenceTimers = [];
        }

        // CONTROLADOR DE INICIO ANIMACIÓN
        btnStart.addEventListener('click', () => {
            btnStart.classList.add('hidden');
            
            // 1. Mostrar módulos iniciales de inmediato con pop elástico
            canvas.classList.add('run-pop');

            // 2. Esperar exactamente 9 segundos flotando de forma limpia
            const morphTimer = setTimeout(() => {
                canvas.classList.remove('run-pop');
                canvas.classList.add('run-flow'); // Comienza disolución y flujo de líneas
            }, 9000);
            sequenceTimers.push(morphTimer);

            // 3. Tras 1.6 segundos de flujo líquido de datos, detonar panel de fusión central
            const fusionTimer = setTimeout(() => {
                canvas.classList.remove('run-flow');
                canvas.classList.add('run-fusion');
                
                // Hacer aparecer suavemente el botón de rebobinado
                btnRewind.classList.add('visible');
            }, 9000 + 1600);
            sequenceTimers.push(fusionTimer);
        });

        // CONTROLADOR DE REBOBINADO (RESET COMPLETO)
        btnRewind.addEventListener('click', () => {
            // Ocultar botón de rebobinado instantáneamente
            btnRewind.classList.remove('visible');
            
            // Apagar todas las clases de animación del lienzo de golpe
            canvas.classList.remove('run-pop', 'run-flow', 'run-fusion');
            clearAllTimers();

            // Pequeña pausa táctica de estabilidad visual antes de restaurar el botón inicial
            setTimeout(() => {
                btnStart.classList.remove('hidden');
            }, 350);
        });
    })();
</script>
</script>
