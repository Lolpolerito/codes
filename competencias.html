<div class="network-hardware-canvas" id="networkCanvas">
    
    <svg class="ethernet-cables-overlay" viewBox="0 0 650 490">
        <path class="ethernet-wire wire-orange" id="leftCable" d="M 145,95 L 215,160" />
        <path class="ethernet-wire wire-green" id="rightCable" d="M 505,95 L 435,160" />
    </svg>

    <div class="static-competence-card tech-border-orange" id="cardLeft">
        <p>Configura conexiones de red</p>
    </div>

    <div class="static-competence-card tech-border-green" id="cardRight">
        <p>Configura y comparte recursos de red</p>
    </div>

    <div class="hardware-monitor-station">
        <div class="monitor-bezel">
            <div class="display-glass">
                
                <div class="screen-layout layout-off">
                    <div class="hardware-power-icon">⏽</div>
                </div>

                <div class="screen-layout layout-loading">
                    <div class="loading-container">
                        <span class="loading-headline">CARGANDO SISTEMA...</span>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="screen-layout layout-active">
                    <div class="system-status-badge">✔ CONEXIÓN EXITOSA</div>
                    <p class="system-main-text">Gestiona recursos mediante el uso de redes de computadoras</p>
                </div>

            </div>
        </div>
        <div class="monitor-neck"></div>
        <div class="monitor-foot"></div>
    </div>

    <button class="hardware-panel-btn btn-action-toggle" id="controlToggle">Pausa</button>

</div>

<style>
    /* Lienzo e Interfaz General (Altura ampliada para acomodar el botón abajo) */
    .network-hardware-canvas {
        position: relative;
        width: 100%;
        max-width: 650px;
        height: 490px;
        margin: 0 auto;
        background: transparent;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        box-sizing: border-box;
    }

    /* Botón de Control reubicado abajo de la TV y centrado */
    .btn-action-toggle {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        padding: 11px 24px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 6px;
        cursor: pointer;
        z-index: 100;
        transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0f172a;
        color: #38bdf8;
        box-shadow: 0 4px 14px rgba(56, 189, 248, 0.15);
    }
    .btn-action-toggle:hover {
        background: #38bdf8;
        color: #0f172a;
        box-shadow: 0 6px 20px rgba(56, 189, 248, 0.35);
    }

    /* Tarjetas Superiores Estables */
    .static-competence-card {
        position: absolute;
        top: 20px;
        width: 210px;
        height: 75px;
        padding: 15px;
        background: #1e293b;
        border-radius: 10px;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
        z-index: 10;
    }
    .static-competence-card p {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.35;
        font-weight: 500;
    }

    .tech-border-orange { left: 40px; border-bottom: 4px solid #f59e0b; }
    .tech-border-green { right: 40px; border-bottom: 4px solid #10b981; }

    /* Estación del Monitor Físico (Desplazado hacia arriba para dar espacio inferior) */
    .hardware-monitor-station {
        position: absolute;
        top: 160px;
        left: 155px;
        width: 340px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 5;
    }
    .monitor-bezel {
        width: 340px;
        height: 190px;
        background: #0f172a;
        border: 4px solid #1e293b;
        border-radius: 8px 8px 0 0;
        padding: 6px;
        box-sizing: border-box;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    .display-glass {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 4px;
        overflow: hidden;
        background: #475569;
    }
    
    .monitor-neck { width: 32px; height: 32px; background: #1e293b; }
    .monitor-foot { width: 120px; height: 8px; background: #0f172a; border-radius: 4px 4px 0 0; }

    /* Vistas de las Pantallas */
    .screen-layout {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
        opacity: 0;
    }

    .layout-off { 
        background: #475569; 
        animation: cycleViewOff 10s infinite linear;
    }
    .hardware-power-icon { font-size: 1.6rem; color: rgba(255,255,255,0.2); }

    .layout-loading { 
        background: #020617;
        box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.2);
        animation: cycleViewLoading 10s infinite linear;
    }
    .loading-container { width: 85%; text-align: center; }
    .loading-headline {
        font-size: 0.75rem;
        font-weight: 800;
        color: #38bdf8;
        letter-spacing: 2px;
        display: block;
        margin-bottom: 12px;
    }
    .progress-bar-track { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
    .progress-bar-fill {
        width: 0%;
        height: 100%;
        background: #38bdf8;
        box-shadow: 0 0 8px #38bdf8;
        animation: cycleBarFill 10s infinite linear;
    }

    .layout-active { 
        background: linear-gradient(135deg, #022c22, #064e3b);
        border: 1px solid #10b981;
        box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.2);
        animation: cycleViewActive 10s infinite linear;
    }
    .system-status-badge {
        font-size: 0.6rem;
        font-weight: 900;
        letter-spacing: 1.5px;
        color: #34d399;
        margin-bottom: 12px;
        border: 1px solid rgba(52, 211, 153, 0.3);
        padding: 3px 10px;
        border-radius: 4px;
        background: rgba(0,0,0,0.2);
    }
    .system-main-text {
        margin: 0;
        color: #f0fdf4;
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.4;
        text-align: center;
    }

    /* Capa de Cables SVG */
    .ethernet-cables-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 2;
    }
    .ethernet-wire {
        fill: none;
        stroke-width: 3.5px;
        stroke-linecap: round;
        stroke-dasharray: 250;
        stroke-dashoffset: 250;
        animation: cycleCables 10s infinite linear;
    }
    .wire-orange { stroke: #f59e0b; }
    .wire-green { stroke: #10b981; }

    /* =========================================================================
       CRONOGRAMA DE KEYFRAMES (CICLO TOTAL DE 10 SEGUNDOS)
       ========================================================================= */
    @keyframes cycleCables {
        0%, 10% { stroke-dashoffset: 250; }
        22%, 90% { stroke-dashoffset: 0; }
        95%, 100% { stroke-dashoffset: 250; }
    }

    @keyframes cycleViewOff {
        0%, 21% { opacity: 1; z-index: 3; }
        22%, 100% { opacity: 0; z-index: 1; }
    }

    @keyframes cycleViewLoading {
        0%, 21% { opacity: 0; z-index: 1; }
        22%, 52% { opacity: 1; z-index: 3; }
        53%, 100% { opacity: 0; z-index: 1; }
    }

    @keyframes cycleBarFill {
        0%, 22% { width: 0%; }
        50%, 90% { width: 100%; }
        95%, 100% { width: 0%; }
    }

    @keyframes cycleViewActive {
        0%, 52% { opacity: 0; z-index: 1; }
        53%, 90% { opacity: 1; z-index: 3; }
        91%, 100% { opacity: 0; z-index: 1; }
    }

    /* Congelador global de fotogramas CSS al pausar */
    .is-paused * {
        animation-play-state: paused !important;
    }
</style>

<script>
    (function() {
        const toggleBtn = document.getElementById('controlToggle');
        const canvas = document.getElementById('networkCanvas');

        toggleBtn.addEventListener('click', () => {
            const isPaused = canvas.classList.toggle('is-paused');
            toggleBtn.textContent = isPaused ? 'Play' : 'Pausa';
        });
    })();
</script>
