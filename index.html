<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de Vídeos con Barras Laterales</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }
        .galeria-container {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 20px;
            max-width: 950px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #333;
        }
        
        /* Contenedor principal que alinea las barras y el video en una sola fila */
        .reproductor-wrapper {
            display: flex;
            align-items: stretch; /* Hace que las barras tengan la misma altura que el video */
            justify-content: center;
            gap: 10px; /* Separación pequeña entre barras y video */
            width: 100%;
        }

        /* Las Barras Laterales Dinámicas */
        .btn-barra {
            background-color: #444444;
            color: #ffffff;
            border: none;
            width: 50px; /* Ancho de la barra lateral */
            font-size: 24px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            user-select: none;
        }

        /* Iluminación dinámica al pasar el mouse (Efecto Glow/Resplandor) */
        .btn-barra:hover {
            background-color: #00bcd4; /* Color cyan de fondo */
            color: #ffffff;
            box-shadow: 0 0 15px #00bcd4, 0 0 25px #00bcd4; /* Resplandor exterior */
        }

        /* Contenedor del iframe de YouTube */
        .video-container {
            position: relative;
            flex-grow: 1; /* Ocupa todo el espacio restante entre las barras */
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 estándar */
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            background-color: #000000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Contador inferior */
        .contador {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            color: #555555;
        }
    </style>
</head>
<body>

<div class="galeria-container">
    <h1>Galería de Vídeos</h1>
    
    <div class="reproductor-wrapper">
        <button class="btn-barra" id="btn-anterior" onclick="cambiarVideo(-1)">&#10094;</button>
        
        <div class="video-container">
            <iframe id="reproductor-youtube" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <button class="btn-barra" id="btn-siguiente" onclick="cambiarVideo(1)">&#10095;</button>
    </div>

    <div class="contador" id="contador-texto">Vídeo 1 de 6</div>
</div>

<script>
    // IDs de tus 6 vídeos de YouTube originales
    const listaVideos = [
        "_JNPvSxG6oM",
        "GqIFy_0di_Q",
        "szaoYQ-yZjc",
        "SHbBso63X38",
        "R6NGSRZ5Dpw",
        "uNmbkXbfviI"
    ];

    let indiceActual = 0;
    const iframeReproductor = document.getElementById('reproductor-youtube');
    const contadorTexto = document.getElementById('contador-texto');

    // Carga el vídeo actual en el iframe
    function cargarVideo(indice) {
        iframeReproductor.src = "https://www.youtube.com/embed/" + listaVideos[indice];
        contadorTexto.innerText = `Vídeo ${indice + 1} de ${listaVideos.length}`;
    }

    // Lógica para avanzar o retroceder de manera infinita
    function cambiarVideo(direccion) {
        indiceActual += direccion;
        if (indiceActual >= listaVideos.length) {
            indiceActual = 0;
        }
        if (indiceActual < 0) {
            indiceActual = listaVideos.length - 1;
        }
        cargarVideo(indiceActual);
    }

    // Ejecución inicial al cargar la web
    cargarVideo(indiceActual);
</script>

</body>
</html>
