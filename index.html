<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Galería de Videos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .galeria-container {
      background: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border-radius: 10px;
      padding: 20px;
      max-width: 900px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 15px;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      background: #000;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .indicador {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
    .pistas {
      margin-top: 8px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="galeria-container">
    <h1>Galería de Videos</h1>
    <div id="videoArea" class="video-wrapper"></div>
    <div class="indicador">
      Video <span id="indiceActual">1</span> de <span id="totalVideos">0</span>
    </div>
    <div class="pistas">
      • Toca para reproducir/pausar<br>
      • Mantén presionado y desliza a la izquierda para siguiente video<br>
      • Mantén presionado y desliza a la derecha para video anterior
    </div>
  </div>

  <script>
    // IDs de tus videos de YouTube
    const videos = [
      "_JNPvSxG6oM",
      "GqIFy_0di_Q",
      "szaoYQ-yZjc",
      "SHbBso63X38",
      "R6NGSRZ5Dpw",
      "uNmbkXbfviI"
    ];

    let indice = 0;
    const videoArea = document.getElementById("videoArea");
    const indiceActual = document.getElementById("indiceActual");
    const totalVideos = document.getElementById("totalVideos");
    totalVideos.textContent = videos.length;

    function cargarVideo(i) {
      const id = videos[i];
      videoArea.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${id}?rel=0&showinfo=0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      `;
      indiceActual.textContent = i + 1;
    }

    cargarVideo(indice);

    // Lógica de toque + swipe
    let presionando = false;
    let xInicio = 0;
    let tiempoInicio = 0;

    function inicioPresion(e) {
      presionando = true;
      tiempoInicio = Date.now();
      xInicio = (e.touches ? e.touches[0].clientX : e.clientX);
    }

    function finPresion(e) {
      if (!presionando) return;
      presionando = false;

      const tiempoFin = Date.now();
      const xFin = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
      const deltaX = xFin - xInicio;
      const duracion = tiempoFin - tiempoInicio;

      const UMBRAL_TIEMPO = 250;   // ms para considerar "mantener"
      const UMBRAL_DESPLAZ = 60;   // px para considerar swipe

      if (duracion < UMBRAL_TIEMPO || Math.abs(deltaX) < UMBRAL_DESPLAZ) {
        return;
      }

      // Swipe izquierda -> siguiente
      if (deltaX < -UMBRAL_DESPLAZ) {
        if (indice < videos.length - 1) {
          indice++;
          cargarVideo(indice);
        }
      }

      // Swipe derecha -> anterior
      if (deltaX > UMBRAL_DESPLAZ) {
        if (indice > 0) {
          indice--;
          cargarVideo(indice);
        }
      }
    }

    videoArea.addEventListener("mousedown", inicioPresion);
    videoArea.addEventListener("mouseup", finPresion);
    videoArea.addEventListener("mouseleave", () => presionando = false);

    videoArea.addEventListener("touchstart", inicioPresion, {passive: true});
    videoArea.addEventListener("touchend", finPresion);
  </script>
</body>
</html>
