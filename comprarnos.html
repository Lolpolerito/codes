<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>¿Por qué elegirnos?</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #6f432a; 
      color: #fdfaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 15px;
      box-sizing: border-box;
    }

    .panel-movil {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.98);
      color: #3e2723;
      border-radius: 20px;
      padding: 25px 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      margin-top: 10px;
    }

    .icon-header {
      font-size: 3.5rem;
      margin: 0;
    }

    h1 {
      margin: 0;
      color: #d35400;
      font-size: 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin: 0;
      color: #3e2723;
    }

    .grafico-wrapper {
      width: 140px;
      height: auto;
      filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.15));
    }
  </style>
</head>
<body>

  <div class="panel-movil">
    <p class="icon-header">🔥</p>
    <h1>Calidad de la Casa vs Lo Comercial</h1>
    <p>Nuestros buñuelos se preparan bajo pedido diario, garantizando que te lleves un producto crujiente, calientito y con ese inigualable sabor familiar que las marcas de bolsa nunca podrán replicar.</p>
    
    <div class="grafico-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect x="20" y="20" width="60" height="60" rx="12" fill="#ff9100"/>
        <circle cx="40" cy="48" r="6" fill="#fff"/><circle cx="60" cy="48" r="6" fill="#fff"/>
        <circle cx="40" cy="48" r="2.5" fill="#3e2723"/><circle cx="60" cy="48" r="2.5" fill="#3e2723"/>
        <path d="M35,62 Q50,74 65,62" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M25,14 L35,22 L45,14 L55,22 L65,14 L75,22 L85,14" fill="none" stroke="#d35400" stroke-width="3"/>
      </svg>
    </div>
  </div>

</body>
</html>
