<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>¿Qué son los Buñuelos?</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #6f432a; 
      color: #fdfaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 15px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .bloque-interactivo {
      width: 100%;
      max-width: 450px;
      margin-top: 20px;
    }

    /* Tarjeta Botón */
    .card {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .card.activa {
      border-color: #ffab40;
      background: rgba(255, 255, 255, 0.15);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      box-shadow: 0 4px 15px rgba(255, 171, 64, 0.3);
    }

    .icon-wrapper { font-size: 2.2rem; flex-shrink: 0; }
    .card-body h2 { font-size: 1.15rem; margin: 0 0 4px 0; color: #ffab40; }
    .card-body p { font-size: 0.85rem; margin: 0; color: #f5ece4; line-height: 1.4; }

    /* Panel Desplegable */
    .panel-desplegable {
      background: rgba(255, 255, 255, 0.98);
      color: #3e2723;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      padding: 20px 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: none;
      display: none;
      animation: abrirPanel 0.3s ease-out;
      text-align: center;
    }

    @keyframes abrirPanel {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-desplegable h3 { margin: 0 0 10px 0; color: #d35400; font-size: 1.3rem; }
    .panel-desplegable p { font-size: 0.95rem; line-height: 1.5; margin: 0 0 15px 0; }
    
    .img-display {
      max-width: 100%;
      width: 240px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div class="bloque-interactivo">
    <div class="card" id="tarjeta-principal" onclick="conmutarContenido()">
      <div class="icon-wrapper">🥞</div>
      <div class="card-body">
        <h2>¿Qué son los Buñuelos?</h2>
        <p>Una masa ultra delgada, frita a la perfección dorada y espolvoreada con azúcar y canela.</p>
      </div>
    </div>
    
    <div class="panel-desplegable" id="panel-contenido">
      <h3>🥞 El Arte del Auténtico Buñuelo</h3>
      <p>Un buñuelo siempre viene bien, son redondos y crujientes, si quieres el tuyo haz un pedido.</p>
      <img class="img-display" src="producto.png" alt="Buñuelo Crujiente Real">
    </div>
  </div>

<script>
  function conmutarContenido() {
    const tarjeta = document.getElementById('tarjeta-principal');
    const panel = document.getElementById('panel-contenido');
    
    if (panel.style.display === 'block') {
      panel.style.display = 'none';
      tarjeta.classList.remove('activa');
    } else {
      panel.style.display = 'block';
      tarjeta.classList.add('activa');
    }
  }
</script>
</body>
</html>
