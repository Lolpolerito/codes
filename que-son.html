<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>¿Qué son los Buñuelos?</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #6f432a; 
      color: #fdfaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 15px;
      box-sizing: border-box;
    }

    .panel-movil {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.98);
      color: #3e2723;
      border-radius: 20px;
      padding: 25px 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      margin-top: 10px;
    }

    .icon-header {
      font-size: 3.5rem;
      margin: 0;
    }

    h1 {
      margin: 0;
      color: #d35400;
      font-size: 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin: 0;
      color: #3e2723;
    }

    .img-display {
      max-width: 100%;
      width: 260px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div class="panel-movil">
    <p class="icon-header">🥞</p>
    <h1>El Arte del Auténtico Buñuelo</h1>
    <p>Un buñuelo siempre viene bien, son redondos y crujientes, si quieres el tuyo haz un pedido.</p>
    <img class="img-display" src="producto.png" alt="Buñuelo Crujiente Real">
  </div>

</body>
</html>
