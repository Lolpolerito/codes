<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Vídeos de Redes</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-slider: #4d4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .gallery-container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 850px;
            padding: 20px;
            text-align: center;
        }

        .gallery-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* Estructura del Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .slider-btn {
            background-color: var(--bg-slider);
            color: white;
            border: none;
            font-size: 2rem;
            padding: 15px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
            z-index: 10;
        }

        .slider-btn:hover {
            background-color: #1a1a1a;
        }

        .video-container {
            width: 100%;
            overflow: hidden;
            margin: 0 10px;
            border-radius: 4px;
        }

        /* Contenedores de los vídeos (Se ocultan/muestran con la clase .active) */
        .video-slide {
            display: none;
            width: 100%;
        }

        .video-slide.active {
            display: block;
        }

        /* Proporción 16:9 para los videos de YouTube */
        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .gallery-footer {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="gallery-container">
    <div class="gallery-title">Galería de Vídeos</div>

    <div class="slider-wrapper">
        <button class="slider-btn" onclick="cambiarVideo(-1)">&#10094;</button>

        <div class="video-container">
            
            <div class="video-slide active">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_1" title="1. Conceptos Básicos de Redes" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-slide">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" title="2. Topologías de Red" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-slide">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" title="3. Tipos de Redes (LAN, WAN)" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-slide">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_4" title="4. Medios de Transmisión" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-slide">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_5" title="5. Dispositivos de Interconexión" allowfullscreen></iframe>
                </div>
            </div>

            <div class="video-slide">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/VIDEO_ID_6" title="6. Configuración y Monitoreo" allowfullscreen></iframe>
                </div>
            </div>

        </div>

        <button class="slider-btn" onclick="cambiarVideo(1)">&#10095;</button>
    </div>

    <div class="gallery-footer" id="video-indicador">Vídeo 1 de 6</div>
</div>

<script>
    let indexActual = 0;
    const slides = document.querySelectorAll('.video-slide');
    const indicador = document.getElementById('video-indicador');

    function cambiarVideo(direccion) {
        // Ocultar el vídeo actual
        slides[indexActual].classList.remove('active');
        
        // Pausar el vídeo que se está ocultando (recargando el src para evitar que siga sonando)
        const iframe = slides[indexActual].querySelector('iframe');
        const srcActual = iframe.src;
        iframe.src = srcActual;

        // Calcular el nuevo índice
        indexActual += direccion;

        // Ciclar el carrusel si llega al inicio o al final
        if (indexActual >= slides.length) {
            indexActual = 0;
        }
        if (indexActual < 0) {
            indexActual = slides.length - 1;
        }

        // Mostrar el nuevo vídeo
        slides[indexActual].classList.add('active');
        
        // Actualizar el texto del pie de página
        indicador.textContent = `Vídeo ${indexActual + 1} de ${slides.length}`;
    }
</script>

</body>
</html>
