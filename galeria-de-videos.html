<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Temática de Redes e Informática</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; /* Cambia esto según el fondo de tu web */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor sin fondo blanco ni sombras */
        .gallery-container {
            background: transparent;
            width: 100%;
            max-width: 850px;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .gallery-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        /* Estructura del Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        /* Botones que se iluminan al pasar el cursor */
        .slider-btn {
            background-color: #2a2a2e;
            color: #e1e1e6;
            border: 2px solid #3a3a3e;
            font-size: 1.8rem;
            padding: 0;
            cursor: pointer;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            user-select: none;
        }

        /* Efecto de iluminación brillante */
        .slider-btn:hover {
            background-color: #007bff;
            color: #ffffff;
            border-color: #00a2ff;
            transform: scale(1.12);
            box-shadow: 0 0 18px rgba(0, 123, 255, 0.85), 0 0 8px rgba(0, 123, 255, 0.4);
        }

        .slider-btn:active {
            transform: scale(0.92);
        }

        /* Ventana de recorte para el desplazamiento fluido */
        .video-window {
            width: 100%;
            overflow: hidden;
            margin: 0 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); /* Sombra elegante solo al video */
        }

        /* Riel horizontal animado */
        .video-track {
            display: flex;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .video-slide {
            flex: 0 0 100%;
            width: 100%;
            box-sizing: border-box;
        }

        /* Formato panorámico 16:9 responsivo */
        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            background-color: #000;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Título dinámico abajo del video */
        .video-title-dinamico {
            font-size: 1.3rem;
            font-weight: 600;
            color: #111;
            margin-top: 20px;
            margin-bottom: 6px;
        }

        /* Contador inferior */
        .gallery-footer {
            font-size: 0.95rem;
            color: #666;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="gallery-container">
    <div class="gallery-title">Ruta de Aprendizaje: Redes Informáticas</div>

    <div class="slider-wrapper">
        <button class="slider-btn" onclick="cambiarVideo(-1)">&#10094;</button>

        <div class="video-window">
            <div class="video-track" id="video-track">
                
                <div class="video-slide" data-titulo="1. ¿Qué es una Red? Descubre la Conexión Ideal">
                    <div class="responsive-iframe">
                        <iframe src="https://www.youtube.com/embed/szaoYQ-yZjc" title="¿Qué es una Red?" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="video-slide" data-titulo="2. Conceptos Básicos de Redes y Protocolo IP">
                    <div class="responsive-iframe">
                        <iframe src="https://www.youtube.com/embed/_JNPvSxG6oM" title="Fundamentos de Redes" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="video-slide" data-titulo="3. ¿Qué es LAN y WAN? - Modelos de Red Corporativos">
                    <div class="responsive-iframe">
                        <iframe src="https://www.youtube.com/embed/uNmbkXbfviI" title="LAN y WAN" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="video-slide" data-titulo="4. Redes WAN Avanzadas, Mensajes y Paquetes de Datos">
                    <div class="responsive-iframe">
                        <iframe src="https://www.youtube.com/embed/R6NGSRZ5Dpw" title="Redes WAN" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="video-slide" data-titulo="5. Direccionamiento IPv4, Máscaras de Red y Subredes">
                    <div class="responsive-iframe">
                        <iframe src="https://www.youtube.com/embed/SHbBso63X38" title="Subredes IPv4" allowfullscreen></iframe>
                    </div>
                </div>

            </div>
        </div>

        <button class="slider-btn" onclick="cambiarVideo(1)">&#10095;</button>
    </div>

    <div class="video-title-dinamico" id="video-titulo">1. ¿Qué es una Red? Descubre la Conexión Ideal</div>
    
    <div class="gallery-footer" id="video-indicador">Vídeo 1 de 5</div>
</div>

<script>
    let indexActual = 0;
    const track = document.getElementById('video-track');
    const slides = document.querySelectorAll('.video-slide');
    const tituloDinamico = document.getElementById('video-titulo');
    const indicador = document.getElementById('video-indicador');

    function cambiarVideo(direccion) {
        // 1. Pausar el vídeo que se deja reseteando su origen (evita que siga sonando de fondo)
        const iframeActual = slides[indexActual].querySelector('iframe');
        const srcActual = iframeActual.src;
        iframeActual.src = srcActual;

        // 2. Calcular el nuevo índice de la diapositiva
        indexActual += direccion;

        if (indexActual >= slides.length) {
            indexActual = 0;
        }
        if (indexActual < 0) {
            indexActual = slides.length - 1;
        }

        // 3. Desplazamiento horizontal fluido multiplicando por el ancho completo (100%)
        track.style.transform = `translateX(-${indexActual * 100}%)`;
        
        // 4. Actualizar el título inferior y el contador dinámicamente
        const nuevoTitulo = slides[indexActual].getAttribute('data-titulo');
        tituloDinamico.textContent = nuevoTitulo;
        indicador.textContent = `Vídeo ${indexActual + 1} de ${slides.length}`;
    }
</script>

</body>
</html>
