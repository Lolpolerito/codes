<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Vídeos de Redes</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-slider: #4d4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9; /* Puedes cambiar este color si toda tu web usa otro fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Removido el contenedor blanco, sombras y bordes */
        .gallery-container {
            width: 90%;
            max-width: 850px;
            padding: 10px;
            text-align: center;
        }

        .gallery-title {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        /* Estructura del Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .slider-btn {
            background-color: var(--bg-slider);
            color: white;
            border: none;
            font-size: 2rem;
            padding: 15px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
            z-index: 10;
        }

        .slider-btn:hover {
            background-color: #1a1a1a;
        }

        .video-container {
            width: 100%;
            overflow: hidden;
            margin: 0 15px;
            border-radius: 6px;
        }

        /* Control de transiciones de los vídeos */
        .video-slide {
            display: none;
            width: 100%;
        }

        .video-slide.active {
            display: block;
        }

        /* Formato panorámico 16:9 responsivo */
        .responsive-iframe {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
        }

        .responsive-iframe iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Contenedor del título dinámico del vídeo */
        .video-title-dinamico {
            font-size: 1.2rem;
            font-weight: 600;
            color: #222;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* Contador inferior */
        .gallery-footer {
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="gallery-container">
    <div class="gallery-title">Galería de Vídeos</div>

    <div class="slider-wrapper">
        <!-- Botón Izquierdo -->
        <button class="slider-btn" onclick="cambiarVideo(-1)">&#10094;</button>

        <div class="video-container">
            
            <!-- VÍDEO 1: Conceptos Básicos -->
            <div class="video-slide active" data-titulo="1. Conceptos Básicos de Redes">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/9Xf_K63M8XU" title="Conceptos Básicos" allowfullscreen></iframe>
                </div>
            </div>

            <!-- VÍDEO 2: Topologías -->
            <div class="video-slide" data-titulo="2. Topologías de Red (Estrella, Malla, Árbol)">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/a8L6e77p8Aw" title="Topologías de Red" allowfullscreen></iframe>
                </div>
            </div>

            <!-- VÍDEO 3: Tipos de Redes -->
            <div class="video-slide" data-titulo="3. Tipos de Redes (LAN, MAN, WAN)">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/S_mS_G63y6k" title="Tipos de Redes" allowfullscreen></iframe>
                </div>
            </div>

            <!-- VÍDEO 4: Cableado y Estándares -->
            <div class="video-slide" data-titulo="4. Medios de Transmisión y Cableado Estructurado">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/4b4_8hX_77k" title="Medios de Transmisión" allowfullscreen></iframe>
                </div>
            </div>

            <!-- VÍDEO 5: Dispositivos de Red -->
            <div class="video-slide" data-titulo="5. Dispositivos de Red (Switch, Router, AP)">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/1v0U_G-fFwY" title="Dispositivos de Red" allowfullscreen></iframe>
                </div>
            </div>

            <!-- VÍDEO 6: Práctica / Dirección IP -->
            <div class="video-slide" data-titulo="6. Introducción a Direcciones IP y Subredes">
                <div class="responsive-iframe">
                    <iframe src="https://www.youtube.com/embed/4_2Z9Zl6X6k" title="Direcciones IP" allowfullscreen></iframe>
                </div>
            </div>

        </div>

        <!-- Botón Derecho -->
        <button class="slider-btn" onclick="cambiarVideo(1)">&#10095;</button>
    </div>

    <!-- Título del vídeo actual -->
    <div class="video-title-dinamico" id="video-titulo">1. Conceptos Básicos de Redes</div>
    
    <!-- Indicador de avance -->
    <div class="gallery-footer" id="video-indicador">Vídeo 1 de 6</div>
</div>

<script>
    let indexActual = 0;
    const slides = document.querySelectorAll('.video-slide');
    const tituloDinamico = document.getElementById('video-titulo');
    const indicador = document.getElementById('video-indicador');

    function cambiarVideo(direccion) {
        // 1. Ocultar el vídeo actual
        slides[indexActual].classList.remove('active');
        
        // Pausar el vídeo que se oculta para que no siga sonando de fondo
        const iframe = slides[indexActual].querySelector('iframe');
        const srcActual = iframe.src;
        iframe.src = srcActual;

        // 2. Calcular el nuevo índice
        indexActual += direccion;

        if (indexActual >= slides.length) {
            indexActual = 0;
        }
        if (indexActual < 0) {
            indexActual = slides.length - 1;
        }

        // 3. Mostrar el nuevo vídeo
        slides[indexActual].classList.add('active');
        
        // 4. Actualizar el título del vídeo y el pie de página dinámicamente
        const nuevoTitulo = slides[indexActual].getAttribute('data-titulo');
        tituloDinamico.textContent = nuevoTitulo;
        indicador.textContent = `Vídeo ${indexActual + 1} de ${slides.length}`;
    }
</script>

</body>
</html>
