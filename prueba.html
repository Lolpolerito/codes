<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gato Buñuelo Simple</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; /* Fondo transparente */
            font-family: system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #contenedor {
            text-align: center;
        }

        #gato {
            width: 250px; /* Tamaño grande y cómodo */
            cursor: pointer;
            transition: transform 0.2s ease;
            
            /* --- EL TRUCO ESTÁ AQUÍ --- */
            mix-blend-mode: multiply; /* Elimina el fondo blanco de la imagen */
        }

        /* Animación simple al hacer clic */
        #gato.animar {
            transform: scale(1.1);
        }

        #mensaje {
            margin-top: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            /* Sombra negra para que el texto resalte sobre cualquier fondo */
            text-shadow: 2px 2px 4px #000000, -2px -2px 4px #000000, 2px -2px 4px #000000, -2px 2px 4px #000000;
        }

        #mensaje.mostrar {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <img id="gato" src="https://th.bing.com/th/id/OIP.JNKv3Ms1cGD52ShscBWM0wHaHa?w=220&h=220&c=7&r=0&o=7&dpr=1.1&pid=1.7&rm=3" alt="Gato Waffle" onclick="interactuar()">
        <div id="mensaje"></div>
    </div>

    <script>
        const gato = document.getElementById('gato');
        const mensaje = document.getElementById('mensaje');

        const frases = [
            "Mi pancita dice que sí. ✨",
            "La felicidad es redonda. 🍩",
            "Con uno se arregla el día. 🌸",
            "¿Y si nos comemos uno? 😋",
            "Es una señal del destino. 🔮"
        ];

        let activo = false;

        function interactuar() {
            if (activo) return;
            activo = true;

            // Animación del gato
            gato.classList.add('animar');

            // Elegir frase y mostrar texto
            const fraseRandom = frases[Math.floor(Math.random() * frases.length)];
            mensaje.innerHTML = `¡Compra un buñuelo!<br>${fraseRandom}`;
            mensaje.classList.add('mostrar');

            // Quitar animación de crecimiento
            setTimeout(() => {
                gato.classList.remove('animar');
            }, 200);

            // Ocultar texto después de 2.5 segundos
            setTimeout(() => {
                mensaje.classList.remove('mostrar');
                activo = false;
            }, 2500);
        }
    </script>

</body>
</html>
