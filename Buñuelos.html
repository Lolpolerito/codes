<div style="text-align:center; font-family:Arial, sans-serif;">
  <style>
    .bunuelo {
      width:200px;
      cursor:pointer;
      transition:transform 0.1s ease;
    }
    .bunuelo:active {
      transform:scale(1.05);
      filter:brightness(1.2);
    }
    #ingredientes {
      display:none;
      margin-top:10px;
      text-align:left;
      max-width:300px;
      margin-inline:auto;
      animation:fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }
  </style>

  <img src="https://drive.google.com/file/d/17h_8fb4PR3QTkoVN_zCAqfnkARb4YflE/view?usp=drive_link" alt="Buñuelo crujiente" class="bunuelo"
       onclick="document.getElementById('ingredientes').style.display='block'">

  <p style="margin-top:10px; font-weight:bold;">
    Haz clic en el buñuelo para ver los ingredientes 🍯
  </p>

  <div id="ingredientes">
    <h3>Ingredientes del buñuelo</h3>
    <ul>
      <li>Harina de trigo</li>
      <li>Huevo</li>
      <li>Leche</li>
      <li>Azúcar</li>
      <li>Mantequilla o manteca</li>
      <li>Canela</li>
      <li>Aceite para freír</li>
    </ul>
  </div>
</div>
