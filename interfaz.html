<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Boton con Burbujas Interactivas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding-top: 20px;
      overflow: hidden;
    }

    /* Botón largo horizontal con esquinas redondas */
    .btn-leer-mas {
      background-color: #3e2723; /* Café oscuro base */
      color: #ffffff;
      border: 2px solid transparent;
      padding: 15px 60px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      border-radius: 50px; /* Esquinas completamente redondas */
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      outline: none;
      user-select: none;
    }

    /* Iluminación en los lados de color café bajo al pasar el mouse */
    .btn-leer-mas:hover {
      background-color: #4e342e;
      /* Resplandor café claro concentrado en los costados */
      box-shadow: 30px 0 35px -15px #d7ccc8, -30px 0 35px -15px #d7ccc8, 0 4px 15px rgba(0,0,0,0.3);
      transform: translateY(-2px);
    }
    
    .btn-leer-mas:active {
      transform: translateY(1px);
    }

    /* Contenedor del área interactiva de las burbujas */
    .contenedor-interactivo {
      position: relative;
      width: 100%;
      max-width: 700px;
      height: 400px;
      margin-top: 20px;
      display: none; /* Oculto al inicio */
    }

    /* Lienzo donde se dibujan y explotan las burbujas */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="btn-leer-mas" id="btnPrincipal" onclick="mostrarInformacion()">LEER MÁS</button>

  <div class="contenedor-interactivo" id="zonaBurbujas">
    <canvas id="canvasBurbujas"></canvas>
  </div>

<script>
  const canvas = document.getElementById('canvasBurbujas');
  const ctx = canvas.getContext('2d');
  let burbujas = [];
  let particulas = [];
  let animacionID;

  // Tu serie de información acomodada (puedes cambiar los textos aquí)
  const listaInformacion = [
    "Harina de trigo de alta calidad",
    "Huevos frescos enteros",
    "Leche entera tibia",
    "Azúcar refinada o mascabado",
    "Mantequilla pura derretida",
    "Canela en polvo aromática",
    "Aceite vegetal para freír"
  ];

  function ajustarCanvas() {
    const contenedor = document.getElementById('zonaBurbujas');
    canvas.width = contenedor.clientWidth;
    canvas.height = contenedor.clientHeight;
  }

  // Clase para gestionar las burbujas flotantes horizontales
  class Burbuja {
    constructor(texto, index) {
      this.texto = texto;
      ctx.font = "bold 14px Arial";
      // Calcular ancho horizontal según el largo del texto
      this.anchoTexto = ctx.measureText(this.texto).width;
      this.width = this.anchoTexto + 40; // Margen interno de la burbuja horizontal
      this.height = 40; // Alto fijo tipo barra/burbuja horizontal
      this.radius = 20; // Radio para los bordes redondos

      // Posición inicial aleatoria
      this.x = Math.random() * (canvas.width - this.width) + this.width / 2;
      this.y = canvas.height + (index * 60) + 50; // Aparecen escalonadas desde abajo
      
      // Velocidad de flotación hacia arriba
      this.vx = (Math.random() - 0.5) * 1;
      this.vy = -(Math.random() * 0.6 + 0.6);
      this.alpha = 1;
    }

    dibujar() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      
      // Dibujar burbuja horizontal con bordes redondos (Rounded Rectangle)
      ctx.beginPath();
      ctx.fillStyle = "rgba(215, 204, 196, 0.85)"; // Fondo café muy bajito translúcido
      ctx.strokeStyle = "#8d6e63"; // Borde café medio
      ctx.lineWidth = 2;
      
      const xPos = this.x - this.width / 2;
      const yPos = this.y - this.height / 2;
      
      ctx.roundRect(xPos, yPos, this.width, this.height, this.radius);
      ctx.fill();
      ctx.stroke();

      // Dibujar el texto centrado dentro de la burbuja
      ctx.fillStyle = "#3e2723"; // Texto café oscuro para buen contraste
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 14px Arial";
      ctx.fillText(this.texto, this.x, this.y);
      ctx.restore();
    }

    actualizar() {
      this.x += this.vx;
      this.y += this.vy;

      // Rebotar ligeramente en las paredes laterales
      if (this.x - this.width/2 < 0 || this.x + this.width/2 > canvas.width) {
        this.vx *= -1;
      }
      // Si llega arriba del todo, vuelve a salir por abajo
      if (this.y + this.height < 0) {
        this.y = canvas.height + 40;
      }
    }
  }

  // Clase para los fragmentos de la explosión
  class Particula {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.radius = Math.random() * 4 + 2;
      // Dirección física de explosión desordenada
      this.vx = (Math.random() - 0.5) * 6;
      this.vy = (Math.random() - 0.5) * 6;
      this.color = Math.random() > 0.5 ? "#d7ccc8" : "#8d6e63";
      this.alpha = 1;
      this.gravity = 0.05;
    }

    dibujar() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
      ctx.restore();
    }

    actualizar() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity; // Caída realista por gravedad
      this.alpha -= 0.02; // Se desvanecen poco a poco
    }
  }

  function mostrarInformacion() {
    const zona = document.getElementById('zonaBurbujas');
    
    // Si ya está abierto, lo reinicia
    if (zona.style.display === "block") return;

    zona.style.display = "block";
    ajustarCanvas();
    
    // Crear burbujas a partir de la lista
    burbujas = listaInformacion.map((info, i) => new Burbuja(info, i));
    particulas = [];
    
    cancelAnimationFrame(animacionID);
    bucleAnimacion();
  }

  function bucleAnimacion() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Manejar Burbujas
    burbujas.forEach(burbuja => {
      burbuja.actualizar();
      burbuja.dibujar();
    });

    // Manejar Partículas de explosión
    particulas.forEach((particula, index) => {
      particula.actualizar();
      particula.dibujar();
      if (particula.alpha <= 0) {
        particulas.splice(index, 1);
      }
    });

    animacionID = requestAnimationFrame(bucleAnimacion);
  }

  // Detectar clics exactos sobre las burbujas para hacerlas explotar
  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    // Coordenadas del mouse relativas al canvas
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    for (let i = burbujas.length - 1; i >= 0; i--) {
      const b = burbujas[i];
      
      // Validar si el clic cayó dentro de los límites rectangulares de la burbuja horizontal
      if (mouseX >= b.x - b.width/2 && mouseX <= b.x + b.width/2 &&
          mouseY >= b.y - b.height/2 && mouseY <= b.y + b.height/2) {
        
        // Crear 25 partículas de explosión en ese punto exacto
        for (let p = 0; p < 25; p++) {
          particulas.push(new Particula(mouseX, mouseY));
        }

        // Eliminar la burbuja de la pantalla (explotó)
        burbujas.splice(i, 1);
        break; // Detener para explotar solo una burbuja a la vez si se enciman
      }
    }
  });

  // Reajustar el tamaño si cambia la ventana o contenedor
  window.addEventListener('resize', ajustarCanvas);
</script>

</body>
</html>
