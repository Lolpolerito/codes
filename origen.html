<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Origen de los Buñuelos</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #6f432a; 
      color: #fdfaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 15px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .panel-movil {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.98);
      color: #3e2723;
      border-radius: 20px;
      padding: 25px 20px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      text-align: center;
      margin-top: 10px;
    }

    .icon-header {
      font-size: 3.5rem;
      margin: 0;
    }

    h1 {
      margin: 0;
      color: #d35400;
      font-size: 1.5rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0;
    }

    .map-wrapper {
      width: 100%;
      background: #eef2f7;
      border-radius: 12px;
      padding: 5px;
      box-sizing: border-box;
      border: 1px solid #e0d4c8;
    }

    .pais { fill: #bcaaa4; transition: fill 0.3s; }
    .clave:active { fill: #ff7043; }
    .ruta-linea { stroke: #d35400; stroke-width: 2; stroke-dasharray: 5; animation: fluirRuta 2s linear infinite; }
    @keyframes fluirRuta { to { stroke-dashoffset: -20; } }

    .mini-tooltip {
      background: #3e2723;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 5px;
      text-align: center;
      border-left: 4px solid #ffab40;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="panel-movil">
    <p class="icon-header">🌍</p>
    <h1>La Ruta Histórica del Sabor</h1>
    <p>Toca los círculos naranjas en el mapa para descubrir el viaje del buñuelo antes de llegar a tu mesa.</p>
    
    <div class="map-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
        <rect width="800" height="320" fill="#eef2f7" rx="10"/>
        <path class="pais clave" onclick="cambiarTextoRuta('oriente')" d="M500,130 L540,120 L550,140 L520,170 Z" />
        <path class="pais clave" onclick="cambiarTextoRuta('espana')" d="M420,100 L450,100 L455,120 L430,135 Z" />
        <path class="pais clave" onclick="cambiarTextoRuta('mexico')" d="M120,140 L150,150 L165,170 L140,200 L110,155 Z" />
        <path d="M510,140 Q465,110 435,120" fill="none" class="ruta-linea" />
        <path d="M420,125 Q280,120 150,165" fill="none" class="ruta-linea" />
        <circle cx="510" cy="140" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('oriente')" />
        <circle cx="435" cy="120" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('espana')" />
        <circle cx="150" cy="165" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('mexico')" />
        <text x="510" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">1. Oriente</text>
        <text x="435" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">2. España</text>
        <text x="150" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">3. México</text>
      </svg>
    </div>
    
    <div class="mini-tooltip" id="texto-mapa">💡 Toca cualquiera de los 3 puntos del mapa para leer la historia.</div>
  </div>

<script>
  const infoRutas = {
    oriente: "🐪 <b>Medio Oriente:</b> Masas fritas en miel de la época medieval.",
    espana: "🏰 <b>España:</b> Se integró a las ferias usando sartenes europeas.",
    mexico: "🇲🇽 <b>México:</b> Se fusionó con canela para ser gigante y crujiente."
  };

  function cambiarTextoRuta(punto) {
    document.getElementById('texto-mapa').innerHTML = infoRutas[punto];
  }
</script>
</body>
</html>
