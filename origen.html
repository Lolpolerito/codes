<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Su Origen</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #6f432a; 
      color: #fdfaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 15px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .bloque-interactivo {
      width: 100%;
      max-width: 450px;
      margin-top: 20px;
    }

    .card {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .card.activa {
      border-color: #ffab40;
      background: rgba(255, 255, 255, 0.15);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      box-shadow: 0 4px 15px rgba(255, 171, 64, 0.3);
    }

    .icon-wrapper { font-size: 2.2rem; flex-shrink: 0; }
    .card-body h2 { font-size: 1.15rem; margin: 0 0 4px 0; color: #ffab40; }
    .card-body p { font-size: 0.85rem; margin: 0; color: #f5ece4; line-height: 1.4; }

    .panel-desplegable {
      background: rgba(255, 255, 255, 0.98);
      color: #3e2723;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      padding: 20px 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: none;
      display: none;
      animation: abrirPanel 0.3s ease-out;
      text-align: center;
    }

    @keyframes abrirPanel {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel-desplegable h3 { margin: 0 0 10px 0; color: #d35400; font-size: 1.3rem; }
    .panel-desplegable p { font-size: 0.95rem; line-height: 1.5; margin: 0 0 15px 0; }

    .map-wrapper {
      width: 100%;
      background: #eef2f7;
      border-radius: 12px;
      padding: 5px;
      box-sizing: border-box;
      border: 1px solid #e0d4c8;
    }

    .pais { fill: #bcaaa4; transition: fill 0.3s; }
    .clave:active { fill: #ff7043; }
    .ruta-linea { stroke: #d35400; stroke-width: 2; stroke-dasharray: 5; animation: fluirRuta 2s linear infinite; }
    @keyframes fluirRuta { to { stroke-dashoffset: -20; } }

    .mini-tooltip {
      background: #3e2723;
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
      border-left: 4px solid #ffab40;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="bloque-interactivo">
    <div class="card" id="tarjeta-principal" onclick="conmutarContenido()">
      <div class="icon-wrapper">🌍</div>
      <div class="card-body">
        <h2>Su Origen</h2>
        <p>Nacieron en la cultura árabe medieval y viajaron hasta el corazón de México.</p>
      </div>
    </div>
    
    <div class="panel-desplegable" id="panel-contenido">
      <h3>🌍 La Ruta Histórica del Sabor</h3>
      <p>Toca los círculos naranjas en el mapa para descubrir su historia.</p>
      
      <div class="map-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
          <rect width="800" height="320" fill="#eef2f7" rx="10"/>
          <path class="pais clave" onclick="cambiarTextoRuta('oriente')" d="M500,130 L540,120 L550,140 L520,170 Z" />
          <path class="pais clave" onclick="cambiarTextoRuta('espana')" d="M420,100 L450,100 L455,120 L430,135 Z" />
          <path class="pais clave" onclick="cambiarTextoRuta('mexico')" d="M120,140 L150,150 L165,170 L140,200 L110,155 Z" />
          <path d="M510,140 Q465,110 435,120" fill="none" class="ruta-linea" />
          <path d="M420,125 Q280,120 150,165" fill="none" class="ruta-linea" />
          <circle cx="510" cy="140" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('oriente')" />
          <circle cx="435" cy="120" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('espana')" />
          <circle cx="150" cy="165" r="14" fill="#e67e22" style="cursor:pointer;" onclick="cambiarTextoRuta('mexico')" />
          <text x="510" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">1. Oriente</text>
          <text x="435" y="95" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">2. España</text>
          <text x="150" y="140" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3e2723" text-anchor="middle">3. México</text>
        </svg>
      </div>
      <div class="mini-tooltip" id="texto-mapa">💡 Toca cualquiera de los 3 puntos del mapa para leer la historia.</div>
    </div>
  </div>

<script>
  const infoRutas = {
    oriente: "🐪 <b>Medio Oriente:</b> Masas fritas en miel de la época medieval.",
    espana: "🏰 <b>España:</b> Se integró a las ferias usando sartenes europeas.",
    mexico: "🇲🇽 <b>México:</b> Se fusionó con canela para ser gigante y crujiente."
  };

  function conmutarContenido() {
    const tarjeta = document.getElementById('tarjeta-principal');
    const panel = document.getElementById('panel-contenido');
    
    if (panel.style.display === 'block') {
      panel.style.display = 'none';
      tarjeta.classList.remove('activa');
    } else {
      panel.style.display = 'block';
      tarjeta.classList.add('activa');
    }
  }

  function cambiarTextoRuta(punto) {
    document.getElementById('texto-mapa').innerHTML = infoRutas[punto];
  }
</script>
</body>
</html>
