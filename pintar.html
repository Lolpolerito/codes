<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pintar por número - Catálogo</title>
<style>
  body {
    font-family: Arial;
    background: #f0f0f0;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  #catalogo img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    border: 3px solid transparent;
  }
  #catalogo img:hover {
    border-color: #007bff;
  }
  #canvas {
    margin-top: 20px;
    display: grid;
    justify-content: center;
    gap: 1px;
  }
  .pixel {
    width: 4px;
    height: 4px;
    background: #ddd;
    cursor: pointer;
  }
  #paleta {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .color {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .color.activo {
    border-color: black;
  }
</style>
</head>
<body>

<h1>🎨 Pintar por número</h1>
<p>Elige una imagen del catálogo para convertirla en un lienzo de 200×200 píxeles.</p>

<div id="catalogo">
  <img src="https://i.imgur.com/3ZQ3Z4P.jpeg" data-nombre="Koala">
  <img src="https://i.imgur.com/3cXQF1P.jpeg" data-nombre="Gato">
  <img src="https://i.imgur.com/8zQY0mM.jpeg" data-nombre="Dinosaurio">
</div>

<h2 id="titulo"></h2>

<div id="paleta"></div>
<div id="canvas"></div>

<script>
const canvas = document.getElementById("canvas");
const paleta = document.getElementById("paleta");
let colorSeleccionado = null;
let mapaColores = [];

function generarPaleta(colores) {
  paleta.innerHTML = "";
  colores.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "color";
    div.style.background = c;
    div.dataset.color = c;
    div.addEventListener("click", () => {
      document.querySelectorAll(".color").forEach(x => x.classList.remove("activo"));
      div.classList.add("activo");
      colorSeleccionado = c;
    });
    paleta.appendChild(div);
  });
}

function procesarImagen(img) {
  const w = 200, h = 200;
  const tempCanvas = document.createElement("canvas");
  tempCanvas.width = w;
  tempCanvas.height = h;
  const ctx = tempCanvas.getContext("2d");
  ctx.drawImage(img, 0, 0, w, h);

  const data = ctx.getImageData(0, 0, w, h).data;

  const coloresUnicos = new Set();
  mapaColores = [];

  for (let i = 0; i < data.length; i += 4) {
    const rgb = `rgb(${data[i]},${data[i+1]},${data[i+2]})`;
    coloresUnicos.add(rgb);
    mapaColores.push(rgb);
  }

  generarPaleta([...coloresUnicos].slice(0, 20)); // Máx 20 colores

  canvas.style.gridTemplateColumns = `repeat(${w}, 4px)`;
  canvas.innerHTML = "";

  mapaColores.forEach((color, index) => {
    const div = document.createElement("div");
    div.className = "pixel";
    div.dataset.correcto = color;
    div.addEventListener("click", () => {
      if (!colorSeleccionado) return;
      div.style.background = colorSeleccionado;
      if (colorSeleccionado === color) {
        div.style.outline = "1px solid lime";
      } else {
        div.style.outline = "1px solid red";
      }
    });
    canvas.appendChild(div);
  });
}

document.querySelectorAll("#catalogo img").forEach(img => {
  img.addEventListener("click", () => {
    document.getElementById("titulo").textContent =
      "Imagen seleccionada: " + img.dataset.nombre;

    const imagen = new Image();
    imagen.crossOrigin = "anonymous";
    imagen.src = img.src;
    imagen.onload = () => procesarImagen(imagen);
  });
});
</script>

</body>
</html>
