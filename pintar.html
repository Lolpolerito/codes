<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perezoso - Pintar por número</title>
<style>
  body {
    font-family: Arial;
    background: #f0f0f0;
    text-align: center;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  /* Contorno del perezoso */
  #perezoso {
    width: 320px;
    margin: 0 auto 20px auto;
    opacity: 0.35;
  }

  /* Paleta */
  #paleta {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  .color {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .color.activo {
    border-color: black;
  }

  /* Canvas 40x40 */
  #canvas {
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(40, 12px);
    grid-template-rows: repeat(40, 12px);
    gap: 1px;
    justify-content: center;
  }
  .pixel {
    width: 12px;
    height: 12px;
    background: #ddd;
    cursor: pointer;
  }

  #mensaje {
    margin-top: 10px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>🦥 Pintar por número — Perezoso</h1>
<p>Resuelve el problema para poder pintar cada pixel.</p>

<!-- ⭐ Contorno simple del perezoso (SVG) -->
<div id="perezoso">
<svg viewBox="0 0 300 300">
  <path d="M150 20
           C80 20, 40 80, 40 140
           C40 200, 80 260, 150 260
           C220 260, 260 200, 260 140
           C260 80, 220 20, 150 20Z"
        fill="none" stroke="black" stroke-width="4"/>

  <circle cx="115" cy="130" r="20" stroke="black" stroke-width="3" fill="none"/>
  <circle cx="185" cy="130" r="20" stroke="black" stroke-width="3" fill="none"/>

  <circle cx="115" cy="130" r="8" fill="black"/>
  <circle cx="185" cy="130" r="8" fill="black"/>

  <path d="M120 180
           C150 200, 180 200, 180 180"
        stroke="black" stroke-width="4" fill="none"/>
</svg>
</div>

<!-- ⭐ Paleta de colores -->
<div id="paleta"></div>

<!-- ⭐ Canvas interactivo -->
<div id="canvas"></div>

<div id="mensaje">Selecciona un color para empezar.</div>

<script>
const paleta = document.getElementById("paleta");
const canvas = document.getElementById("canvas");
const mensaje = document.getElementById("mensaje");

let colorSeleccionado = null;

// Paleta fija
const coloresBase = [
  "#000000", "#8B4513", "#FFD700", "#FFA500",
  "#FF0000", "#87CEEB", "#008000", "#7CFC00"
];

// Crear paleta
coloresBase.forEach(c => {
  const div = document.createElement("div");
  div.className = "color";
  div.style.background = c;
  div.dataset.color = c;

  div.addEventListener("click", () => {
    document.querySelectorAll(".color").forEach(x => x.classList.remove("activo"));
    div.classList.add("activo");
    colorSeleccionado = c;
    mensaje.textContent = "Color seleccionado. Haz clic en un pixel para resolver un problema.";
  });

  paleta.appendChild(div);
});

// Generar problemas matemáticos
function generarProblema() {
  const a = Math.floor(Math.random() * 20) + 1;
  const b = Math.floor(Math.random() * 20) + 1;
  const tipo = Math.random() < 0.5 ? "+" : "-";

  const texto = `${a} ${tipo} ${b}`;
  const resultado = tipo === "+" ? a + b : a - b;

  return { texto, resultado };
}

// Crear grid 40x40
for (let i = 0; i < 40 * 40; i++) {
  const pixel = document.createElement("div");
  pixel.className = "pixel";

  const problema = generarProblema();
  pixel.dataset.problema = problema.texto;
  pixel.dataset.resultado = problema.resultado;

  pixel.addEventListener("click", () => {
    if (!colorSeleccionado) {
      mensaje.textContent = "Primero selecciona un color.";
      return;
    }

    const texto = pixel.dataset.problema;
    const correcto = Number(pixel.dataset.resultado);

    const respuesta = prompt(`Resuelve para pintar:\n${texto} = ?`);
    if (respuesta === null) return;

    const valor = Number(respuesta);

    if (valor === correcto) {
      pixel.style.background = colorSeleccionado;
      mensaje.textContent = `Correcto: ${texto} = ${correcto}. Pixel pintado.`;
    } else {
      mensaje.textContent = `Incorrecto: ${texto} = ${correcto}. Intenta de nuevo.`;
    }
  });

  canvas.appendChild(pixel);
}
</script>

</body>
</html>
