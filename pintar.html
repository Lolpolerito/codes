<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pintar por número 40x40</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  h1 { margin-bottom: 5px; }
  #paleta {
    margin: 15px 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .color {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .color.activo {
    border-color: black;
  }
  #canvas {
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(40, 12px);
    grid-template-rows: repeat(40, 12px);
    gap: 1px;
    justify-content: center;
  }
  .pixel {
    width: 12px;
    height: 12px;
    background: #ddd;
    cursor: pointer;
  }
  #mensaje {
    margin-top: 10px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>🎨 Pintar por número 40×40</h1>
<p>Selecciona un color y haz clic en un pixel. Para pintarlo, resuelve el problema matemático.</p>

<div id="paleta"></div>
<div id="canvas"></div>
<div id="mensaje">Elige un color para empezar.</div>

<script>
const paleta = document.getElementById("paleta");
const canvas = document.getElementById("canvas");
const mensaje = document.getElementById("mensaje");

let colorSeleccionado = null;

// Paleta fija de colores
const coloresBase = [
  "#000000", // negro
  "#8B4513", // café
  "#FFD700", // amarillo
  "#FFA500", // naranja
  "#FF0000", // rojo
  "#87CEEB", // celeste
  "#008000", // verde
  "#7CFC00"  // verde claro
];

// Generar paleta
coloresBase.forEach(c => {
  const div = document.createElement("div");
  div.className = "color";
  div.style.background = c;
  div.dataset.color = c;
  div.addEventListener("click", () => {
    document.querySelectorAll(".color").forEach(x => x.classList.remove("activo"));
    div.classList.add("activo");
    colorSeleccionado = c;
    mensaje.textContent = "Color seleccionado. Haz clic en un pixel para resolver un problema.";
  });
  paleta.appendChild(div);
});

// Generar problemas matemáticos simples (multiplicaciones)
function generarProblema() {
  const a = Math.floor(Math.random() * 9) + 2; // 2–10
  const b = Math.floor(Math.random() * 9) + 2;
  return { texto: `${a} × ${b}`, resultado: a * b };
}

// Crear grid 40x40
for (let i = 0; i < 40 * 40; i++) {
  const pixel = document.createElement("div");
  pixel.className = "pixel";

  // Asignar problema al pixel
  const problema = generarProblema();
  pixel.dataset.problema = problema.texto;
  pixel.dataset.resultado = problema.resultado;

  pixel.addEventListener("click", () => {
    if (!colorSeleccionado) {
      mensaje.textContent = "Primero selecciona un color en la paleta.";
      return;
    }

    const texto = pixel.dataset.problema;
    const resultadoCorrecto = Number(pixel.dataset.resultado);

    const respuesta = prompt(`Resuelve para pintar:\n${texto} = ?`);
    if (respuesta === null) return; // cancelado

    const valor = Number(respuesta);

    if (!Number.isFinite(valor)) {
      mensaje.textContent = "Escribe un número válido.";
      return;
    }

    if (valor === resultadoCorrecto) {
      pixel.style.background = colorSeleccionado;
      mensaje.textContent = `Correcto: ${texto} = ${resultadoCorrecto}. Pixel pintado.`;
    } else {
      mensaje.textContent = `Incorrecto: ${texto} = ${resultadoCorrecto}. Intenta de nuevo.`;
    }
  });

  canvas.appendChild(pixel);
}
</script>

</body>
</html>
